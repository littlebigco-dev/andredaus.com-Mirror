backend:
  name: gitlab
  repo: your-gitlab-username/andredaus-com   # ← update this
  branch: main
  auth_type: pkce
  app_id: YOUR_GITLAB_APPLICATION_ID         # ← update this

media_folder: src/assets/uploads
public_folder: /assets/uploads

# og_image fields are excluded throughout — generated by og-images.mjs at build time

local_backend:
  url: http://localhost:8081/api/v1

collections:

  # ────────────────────────────────────────────────────────────────────
  # INSIGHTS
  # schema: title, date, og_title?, summary?, category, status
  # ────────────────────────────────────────────────────────────────────

  - name: insights_en
    label: "Insights (EN)"
    folder: src/content/insights/en
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "OG Title", name: og_title, widget: string, required: false,
          hint: "Shorter title for OG image and social sharing. Leave blank to use Title." }
      - { label: "Published Date", name: date, widget: datetime }
      - { label: Summary, name: summary, widget: text, required: false,
          hint: "AI-generated at build time if left empty." }
      - label: Category
        name: category
        widget: select
        options:
          - { label: Strategy, value: Strategy }
          - { label: Psychology, value: Psychology }
          - { label: Technology, value: Technology }
          - { label: Business, value: Business }
          - { label: Methodology, value: Methodology }
        default: Strategy
      - label: Status
        name: status
        widget: select
        options:
          - { label: Draft, value: draft }
          - { label: Published, value: published }
        default: draft
      - { label: Body, name: body, widget: markdown }

  - name: insights_de
    label: "Insights (DE)"
    folder: src/content/insights/de
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: "OG Titel", name: og_title, widget: string, required: false }
      - { label: Veröffentlichungsdatum, name: date, widget: datetime }
      - { label: Zusammenfassung, name: summary, widget: text, required: false }
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Strategie, value: Strategy }
          - { label: Psychologie, value: Psychology }
          - { label: Technologie, value: Technology }
          - { label: Business, value: Business }
          - { label: Methodik, value: Methodology }
        default: Strategy
      - label: Status
        name: status
        widget: select
        options:
          - { label: Entwurf, value: draft }
          - { label: Veröffentlicht, value: published }
        default: draft
      - { label: Inhalt, name: body, widget: markdown }

  # ────────────────────────────────────────────────────────────────────
  # SERVICES
  # schema: title, status, price, format, cta_label, featured_use_cases,
  #         type[], engagement_type?, one_liner?, description?,
  #         duration?, group_size?, delivery?, suitable_for?,
  #         pull_quote?, outcomes[], for_profiles[], not_for?, og_title?
  # ────────────────────────────────────────────────────────────────────

  - name: services_en
    label: "Services (EN)"
    folder: src/content/services/en
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Active, value: active }
          - { label: Retired, value: retired }
        default: active
      - { label: Price, name: price, widget: string,
          hint: 'e.g. "€400" or "from €400"' }
      - { label: Format, name: format, widget: string,
          hint: 'e.g. "90 min video call" or "async written report"' }
      - { label: "CTA Button Label", name: cta_label, widget: string,
          hint: 'e.g. "Book a call"' }
      - { label: "OG Title", name: og_title, widget: string, required: false }
      - label: Type
        name: type
        widget: select
        multiple: true
        options:
          - { label: Individual, value: individual }
          - { label: Team, value: team }
          - { label: Workshop, value: workshop }
          - { label: Cohort, value: cohort }
        default: [individual]
      - { label: "Engagement Type", name: engagement_type, widget: string, required: false,
          hint: 'Shown in the hero badge, e.g. "Discovery Engagement · Individual or Team"' }
      - { label: "One Liner", name: one_liner, widget: string, required: false,
          hint: "Short italic gold one-liner shown under the title." }
      - { label: Description, name: description, widget: text, required: false,
          hint: "2-3 sentence hero description." }
      - { label: Duration, name: duration, widget: string, required: false,
          hint: 'e.g. "1-3 days"' }
      - { label: "Group Size", name: group_size, widget: string, required: false,
          hint: 'e.g. "Individual" or "6-20"' }
      - { label: Delivery, name: delivery, widget: string, required: false,
          hint: 'e.g. "On-site, remote, or both"' }
      - { label: "Suitable For", name: suitable_for, widget: string, required: false,
          hint: 'e.g. "Leaders, founders, teams"' }
      - { label: "Pull Quote", name: pull_quote, widget: text, required: false }
      - { label: "Not For", name: not_for, widget: text, required: false }
      - label: "Featured Use Cases"
        name: featured_use_cases
        widget: list
        required: false
        hint: "Slugs of use cases that illustrate this service, e.g. en/my-use-case"
        field: { label: "Use Case Slug", name: item, widget: string }
      - label: Outcomes
        name: outcomes
        widget: list
        required: false
        hint: "What participants leave with."
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Description, name: description, widget: text }
      - label: "For Profiles"
        name: for_profiles
        widget: list
        required: false
        hint: "Who this service is for."
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: text }
      - { label: Description, name: body, widget: markdown }

  - name: services_de
    label: "Services (DE)"
    folder: src/content/services/de
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Titel, name: title, widget: string }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Aktiv, value: active }
          - { label: Eingestellt, value: retired }
        default: active
      - { label: Preis, name: price, widget: string }
      - { label: Format, name: format, widget: string }
      - { label: "CTA Button Text", name: cta_label, widget: string }
      - { label: "OG Titel", name: og_title, widget: string, required: false }
      - label: Typ
        name: type
        widget: select
        multiple: true
        options:
          - { label: Einzelperson, value: individual }
          - { label: Team, value: team }
          - { label: Workshop, value: workshop }
          - { label: Kohorte, value: cohort }
        default: [individual]
      - { label: "Engagement-Typ", name: engagement_type, widget: string, required: false }
      - { label: "One Liner", name: one_liner, widget: string, required: false }
      - { label: Beschreibung, name: description, widget: text, required: false }
      - { label: Dauer, name: duration, widget: string, required: false }
      - { label: Gruppengroesse, name: group_size, widget: string, required: false }
      - { label: Durchfuehrung, name: delivery, widget: string, required: false }
      - { label: "Geeignet fuer", name: suitable_for, widget: string, required: false }
      - { label: "Pull Quote", name: pull_quote, widget: text, required: false }
      - { label: "Nicht geeignet fuer", name: not_for, widget: text, required: false }
      - label: "Ausgewaehlte Use Cases"
        name: featured_use_cases
        widget: list
        required: false
        field: { label: "Use Case Slug", name: item, widget: string }
      - label: Ergebnisse
        name: outcomes
        widget: list
        required: false
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Beschreibung, name: description, widget: text }
      - label: "Fuer wen"
        name: for_profiles
        widget: list
        required: false
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Text, name: body, widget: text }
      - { label: Leistungsbeschreibung, name: body, widget: markdown }

  # ────────────────────────────────────────────────────────────────────
  # USE CASES
  # schema: title, status, date, topic, scenario, summary?,
  #         category, domain[], applies_to?, org_size?,
  #         primary_service?, secondary_service?, stats[], og_title?
  # ────────────────────────────────────────────────────────────────────

  - name: use_cases_en
    label: "Use Cases (EN)"
    folder: src/content/use-cases/en
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "OG Title", name: og_title, widget: string, required: false }
      - { label: "Published Date", name: date, widget: datetime }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Draft, value: draft }
          - { label: Published, value: published }
        default: draft
      - { label: Topic, name: topic, widget: string,
          hint: 'Broad organisational concern, e.g. "Cybersecurity" or "Leadership Alignment"' }
      - { label: Scenario, name: scenario, widget: text,
          hint: "1-2 sentences. The specific situation this case is built around." }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Category, name: category, widget: string,
          hint: "Primary filter category matching archive filter buttons." }
      - label: Domain
        name: domain
        widget: list
        required: false
        field: { label: Domain, name: item, widget: string }
      - { label: "Applies To", name: applies_to, widget: string, required: false,
          hint: 'e.g. "All industries"' }
      - { label: "Org Size", name: org_size, widget: string, required: false,
          hint: 'e.g. "Mid-market upward"' }
      - { label: "Primary Service", name: primary_service, widget: string, required: false,
          hint: "Slug of the primary service, e.g. assumption-hunting" }
      - { label: "Secondary Service", name: secondary_service, widget: string, required: false }
      - label: Stats
        name: stats
        widget: list
        required: false
        hint: "Key data points shown in the hero stats strip."
        fields:
          - { label: Value, name: value, widget: string, hint: 'e.g. "85%"' }
          - { label: Label, name: label, widget: string, hint: 'e.g. "of breaches involve a human component"' }
      - { label: Body, name: body, widget: markdown }

  - name: use_cases_de
    label: "Use Cases (DE)"
    folder: src/content/use-cases/de
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: "OG Titel", name: og_title, widget: string, required: false }
      - { label: Veroeffentlichungsdatum, name: date, widget: datetime }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Entwurf, value: draft }
          - { label: Veroeffentlicht, value: published }
        default: draft
      - { label: Thema, name: topic, widget: string }
      - { label: Szenario, name: scenario, widget: text }
      - { label: Zusammenfassung, name: summary, widget: text, required: false }
      - { label: Kategorie, name: category, widget: string }
      - label: Domaene
        name: domain
        widget: list
        required: false
        field: { label: Domaene, name: item, widget: string }
      - { label: "Gilt fuer", name: applies_to, widget: string, required: false }
      - { label: Unternehmensgroesse, name: org_size, widget: string, required: false }
      - { label: "Primaerer Service", name: primary_service, widget: string, required: false }
      - { label: "Sekundaerer Service", name: secondary_service, widget: string, required: false }
      - label: Statistiken
        name: stats
        widget: list
        required: false
        fields:
          - { label: Wert, name: value, widget: string }
          - { label: Beschriftung, name: label, widget: string }
      - { label: Inhalt, name: body, widget: markdown }

  # ────────────────────────────────────────────────────────────────────
  # LIBRARY
  # schema: title, type (bias|structure|method), definition, summary?,
  #         first_described?, applies_to?, risk_level?, tags[],
  #         related_entries[] (slugs), in_practice[] (type+slug+note?), og_title?
  # ────────────────────────────────────────────────────────────────────

  - name: library_en
    label: "Library (EN)"
    folder: src/content/library/en
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "OG Title", name: og_title, widget: string, required: false }
      - label: Type
        name: type
        widget: select
        options:
          - { label: Bias, value: bias }
          - { label: Structure, value: structure }
          - { label: Method, value: method }
        default: bias
      - { label: Definition, name: definition, widget: text,
          hint: "Short precise definition shown on cards and in the hero." }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: "First Described", name: first_described, widget: string, required: false,
          hint: 'e.g. "Kahneman & Tversky, 1974"' }
      - { label: "Applies To", name: applies_to, widget: string, required: false }
      - { label: "Risk Level", name: risk_level, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: item, widget: string }
      - label: "Related Entries"
        name: related_entries
        widget: list
        required: false
        hint: "Slugs of related library entries."
        field:
          label: Entry
          name: item
          widget: relation
          collection: library_en
          search_fields: [title]
          value_field: "{{slug}}"
          display_fields: [title]
      - label: "In Practice"
        name: in_practice
        widget: list
        required: false
        hint: "Use cases or insights where this concept appears."
        fields:
          - label: Type
            name: type
            widget: select
            options:
              - { label: "Use Case", value: use-case }
              - { label: Insight, value: insight }
          - { label: Slug, name: slug, widget: string,
              hint: "Slug of the entry, e.g. en/my-use-case" }
          - { label: Note, name: note, widget: text, required: false,
              hint: "Optional sentence describing how this concept appears." }
      - { label: Body, name: body, widget: markdown }

  - name: library_de
    label: "Library (DE)"
    folder: src/content/library/de
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: "OG Titel", name: og_title, widget: string, required: false }
      - label: Typ
        name: type
        widget: select
        options:
          - { label: Bias, value: bias }
          - { label: Struktur, value: structure }
          - { label: Methode, value: method }
        default: bias
      - { label: Definition, name: definition, widget: text }
      - { label: Zusammenfassung, name: summary, widget: text, required: false }
      - { label: "Erstmals beschrieben", name: first_described, widget: string, required: false }
      - { label: "Gilt fuer", name: applies_to, widget: string, required: false }
      - { label: Risikoniveau, name: risk_level, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: item, widget: string }
      - label: "Verwandte Eintraege"
        name: related_entries
        widget: list
        required: false
        field:
          label: Eintrag
          name: item
          widget: relation
          collection: library_de
          search_fields: [title]
          value_field: "{{slug}}"
          display_fields: [title]
      - label: "In der Praxis"
        name: in_practice
        widget: list
        required: false
        fields:
          - label: Typ
            name: type
            widget: select
            options:
              - { label: "Use Case", value: use-case }
              - { label: Insight, value: insight }
          - { label: Slug, name: slug, widget: string }
          - { label: Hinweis, name: note, widget: text, required: false }
      - { label: Inhalt, name: body, widget: markdown }

  # ────────────────────────────────────────────────────────────────────
  # FAQs
  # schema: question, answer, category, order
  # ────────────────────────────────────────────────────────────────────

  - name: faqs_en
    label: "FAQs (EN)"
    folder: src/content/faqs/en
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Question, name: question, widget: string }
      - { label: Answer, name: answer, widget: text }
      - { label: Category, name: category, widget: string,
          hint: 'e.g. "Services", "Methodology", "Working Together", "Technical"' }
      - { label: "Display Order", name: order, widget: number, default: 0,
          hint: "Lower numbers appear first within the same category." }

  - name: faqs_de
    label: "FAQs (DE)"
    folder: src/content/faqs/de
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Frage, name: question, widget: string }
      - { label: Antwort, name: answer, widget: text }
      - { label: Kategorie, name: category, widget: string,
          hint: 'z.B. "Services", "Methodik", "Zusammenarbeit", "Technisch"' }
      - { label: Anzeigereihenfolge, name: order, widget: number, default: 0 }

  # ────────────────────────────────────────────────────────────────────
  # PODCAST
  # schema: title, date, episode_number, summary?, og_title (required),
  #         episode_id?, audio_url (required), artwork_url?,
  #         spotify_url?, youtube_url?, duration?, category, status,
  #         publish_date?
  # ────────────────────────────────────────────────────────────────────

  - name: podcast_en
    label: "Podcast Episodes (EN)"
    folder: src/content/podcast/en
    create: true
    slug: "{{episode_number}}-{{slug}}"
    extension: md
    fields:
      - { label: "Episode Title", name: title, widget: string }
      - { label: "OG Title", name: og_title, widget: string,
          hint: "Required. Shorter title for OG image and social sharing." }
      - { label: "Published Date", name: date, widget: datetime }
      - { label: "Publish Date Override", name: publish_date, widget: datetime, required: false,
          hint: "Optional override for scheduled publishing." }
      - { label: "Episode Number", name: episode_number, widget: number }
      - { label: Category, name: category, widget: string,
          hint: 'e.g. "Cybersecurity" or "Business Strategy"' }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Draft, value: draft }
          - { label: Published, value: published }
        default: draft
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: "Episode Description", name: description, widget: markdown, required: false,
          hint: "Show notes / Spotify description. Shown on the episode page." }
      - { label: "Audio URL", name: audio_url, widget: string,
          hint: "Required. Direct MP3 URL for RSS enclosure." }
      - { label: "Episode ID", name: episode_id, widget: string, required: false,
          hint: "RSS guid. Leave blank to auto-generate." }
      - { label: "Artwork URL", name: artwork_url, widget: string, required: false,
          hint: "Episode-specific artwork for RSS itunes:image." }
      - { label: "YouTube URL", name: youtube_url, widget: string, required: false }
      - { label: "Spotify URL", name: spotify_url, widget: string, required: false }
      - { label: Duration, name: duration, widget: string, required: false,
          hint: 'RSS itunes:duration format, e.g. "00:47:23"' }
      - { label: Transcript, name: body, widget: markdown, required: false }

  - name: podcast_de
    label: "Podcast Episodes (DE)"
    folder: src/content/podcast/de
    create: true
    slug: "{{episode_number}}-{{slug}}"
    extension: md
    fields:
      - { label: Episodentitel, name: title, widget: string }
      - { label: "OG Titel", name: og_title, widget: string }
      - { label: Veroeffentlichungsdatum, name: date, widget: datetime }
      - { label: "Geplantes Datum", name: publish_date, widget: datetime, required: false }
      - { label: Episodennummer, name: episode_number, widget: number }
      - { label: Kategorie, name: category, widget: string }
      - label: Status
        name: status
        widget: select
        options:
          - { label: Entwurf, value: draft }
          - { label: Veroeffentlicht, value: published }
        default: draft
      - { label: Zusammenfassung, name: summary, widget: text, required: false }
      - { label: "Episode Description", name: description, widget: markdown, required: false,
          hint: "Show notes / Spotify description. Shown on the episode page." }
      - { label: "Audio URL", name: audio_url, widget: string,
          hint: "Pflichtfeld. Direkte MP3-URL fuer RSS enclosure." }
      - { label: "Episoden-ID", name: episode_id, widget: string, required: false }
      - { label: "Artwork URL", name: artwork_url, widget: string, required: false }
      - { label: "YouTube URL", name: youtube_url, widget: string, required: false }
      - { label: "Spotify URL", name: spotify_url, widget: string, required: false }
      - { label: Dauer, name: duration, widget: string, required: false,
          hint: 'RSS itunes:duration Format, z.B. "00:47:23"' }
      - { label: Transkript, name: body, widget: markdown, required: false }