<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image Template — André Daus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,300&family=Work+Sans:wght@400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #090c14;
      overflow: hidden;
      position: relative;
    }

    /* Subtle vignette */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(196,154,60,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .frame {
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(196,154,60,0.12);
      pointer-events: none;
    }

    .layout {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: stretch;
    }

    /* ── Left: text ── */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 56px 64px 72px;
    }

    .top {}

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c49a3c;
      margin-bottom: 32px;
    }

    .name {
      font-family: 'Fraunces', serif;
      font-size: 80px;
      font-weight: 700;
      color: #f4f0e8;
      line-height: 0.97;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: #c49a3c;
      margin: 36px 0;
      opacity: 0.6;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 22px;
      color: rgba(244, 240, 232, 0.6);
      line-height: 1.55;
      max-width: 400px;
    }

    .bottom {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bottom-line {
      width: 28px;
      height: 1px;
      background: rgba(196,154,60,0.5);
    }

    .domain {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: rgba(196,154,60,0.55);
    }

    /* ── Right: photo ── */
    .right {
      width: 420px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Gradient fade on left edge of photo area — blends photo into background */
    .right::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 120px;
      background: linear-gradient(to right, #090c14, transparent);
      z-index: 2;
      pointer-events: none;
    }

    .photo-slot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      border-left: 1px dashed rgba(196,154,60,0.15);
      color: rgba(196,154,60,0.3);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 40px;
      line-height: 1.8;
    }

    .photo-slot svg {
      opacity: 0.25;
      margin-bottom: 8px;
    }

    /* ── Once photo is placed, replace .photo-slot with this ── */
    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
  </style>
</head>
<body>
  <div class="frame"></div>

  <div class="layout">
    <div class="left">
      <div class="top">
        <div class="label">AI Investment Due Diligence</div>
        <div class="name">André<br>Daus</div>
        <div class="divider"></div>
        <div class="tagline">Find the wrong assumption<br>before the market does.</div>
      </div>
      <div class="bottom">
        <div class="bottom-line"></div>
        <div class="domain">andredaus.com</div>
      </div>
    </div>

    <div class="right">
      <!--
        TO ADD YOUR PHOTO:
        1. Replace the .photo-slot div below with:
           <img src="your-photo.png" style="width:100%;height:100%;object-fit:cover;object-position:top center;">
        2. If using a transparent-background PNG, set object-fit:contain instead
        3. Screenshot at 1200×630px and save as public/og-default.png
      -->
      <div class="photo-slot">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        PLACE HEADSHOT HERE<br>
        transparent-bg PNG recommended<br>
        photo will be edge-blended left<br><br>
        then screenshot at 1200×630
      </div>
    </div>
  </div>
</body>
</html>
